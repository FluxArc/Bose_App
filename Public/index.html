<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoundTouch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Wood grain palette */
      --walnut:       #1a1410;
      --walnut2:      #231c16;
      --walnut3:      #2e251d;
      --plank:        #3a2f25;
      --grain:        #4d3f32;
      --grain2:       #6b5542;
      --grain3:       #8a6e56;
      --sandstone:    #c4a882;
      --flax:         #dfc9a8;
      --parchment:    #f2e6d0;

      /* Amber warm light */
      --amber:        #d4843a;
      --amber2:       #e8a050;
      --amber-glow:   rgba(212,132,58,0.18);
      --amber-border: rgba(212,132,58,0.28);

      /* Functional */
      --online:       #7ab896;
      --online-glow:  rgba(122,184,150,0.20);
      --danger:       #c05a3a;

      /* Borders & shadows */
      --border:       rgba(212,180,140,0.10);
      --border2:      rgba(212,180,140,0.06);
      --shadow-sm:    0 1px 4px rgba(10,7,4,0.40);
      --shadow-md:    0 4px 20px rgba(10,7,4,0.50);
      --shadow-lg:    0 12px 48px rgba(10,7,4,0.60);
      --shadow-inset: inset 0 1px 0 rgba(212,180,140,0.08);
    }

    html, body {
      height: 100%;
      background: var(--walnut);
      color: var(--flax);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle wood grain texture via repeating SVG */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.025;
      background-image: repeating-linear-gradient(
        92deg,
        transparent 0px, transparent 3px,
        rgba(255,220,160,0.6) 3px, rgba(255,220,160,0.6) 4px,
        transparent 4px, transparent 11px,
        rgba(255,220,160,0.3) 11px, rgba(255,220,160,0.3) 12px,
        transparent 12px, transparent 23px,
        rgba(255,220,160,0.5) 23px, rgba(255,220,160,0.5) 24px
      );
    }

    .app {
      display: grid;
      grid-template-columns: 288px 1fr;
      min-height: 100vh;
      position: relative; z-index: 1;
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--walnut2);
      border-right: 1px solid var(--border);
      box-shadow: var(--shadow-inset), 2px 0 24px rgba(10,7,4,0.30);
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }

    .sidebar-header {
      padding: 30px 22px 22px;
      border-bottom: 1px solid var(--border2);
      background: linear-gradient(180deg, var(--walnut3) 0%, var(--walnut2) 100%);
    }

    .wordmark {
      display: flex; align-items: center; gap: 9px; margin-bottom: 4px;
    }

    .wm-icon {
      width: 30px; height: 30px; border-radius: 8px;
      background: linear-gradient(135deg, var(--amber) 0%, #b86a20 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; box-shadow: 0 2px 8px rgba(212,132,58,0.35);
      flex-shrink: 0;
    }

    .wm-text {
      font-family: 'Lora', Georgia, serif;
      font-size: 19px; color: var(--parchment);
      letter-spacing: -0.2px; font-weight: 600;
    }

    .wm-sub {
      font-size: 10px; font-weight: 400; letter-spacing: 1.4px;
      text-transform: uppercase; color: var(--grain3);
      padding-left: 39px;
    }

    .section-label {
      font-size: 9.5px; font-weight: 500; letter-spacing: 1.6px;
      text-transform: uppercase; color: var(--grain3);
      padding: 20px 22px 9px;
    }

    .speaker-list { flex: 1; padding: 0 10px 10px; }

    .speaker-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 12px; border-radius: 10px;
      cursor: pointer; transition: background 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .speaker-item:hover { background: var(--walnut3); }

    .speaker-item.active {
      background: var(--plank);
      box-shadow: var(--shadow-inset), inset 3px 0 0 var(--amber);
    }

    .speaker-avatar {
      width: 36px; height: 36px; border-radius: 9px;
      background: var(--plank); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0; transition: all 0.2s;
    }

    .speaker-item.active .speaker-avatar {
      background: rgba(212,132,58,0.15);
      border-color: var(--amber-border);
    }

    .speaker-info { flex: 1; min-width: 0; }

    .speaker-name {
      font-weight: 500; font-size: 13.5px;
      color: var(--flax); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }

    .speaker-item.active .speaker-name { color: var(--parchment); }

    .speaker-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--grain3); margin-top: 1px;
    }

    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--grain2); flex-shrink: 0; transition: all 0.3s;
    }

    .status-dot.online {
      background: var(--online);
      box-shadow: 0 0 0 3px var(--online-glow);
    }

    .speaker-delete {
      opacity: 0; padding: 5px; background: none; border: none;
      color: var(--grain2); cursor: pointer; font-size: 12px;
      border-radius: 6px; transition: all 0.15s;
    }

    .speaker-item:hover .speaker-delete { opacity: 1; }
    .speaker-delete:hover { color: var(--danger); background: rgba(192,90,58,0.15); }

    .add-btn {
      margin: 4px 10px 22px;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: none;
      border: 1px dashed var(--grain); border-radius: 10px;
      color: var(--grain3); font-family: inherit;
      font-size: 12.5px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      width: calc(100% - 20px);
    }

    .add-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-glow);
    }

    /* ── Main ── */
    .main { padding: 36px 40px; overflow-y: auto; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 65vh; gap: 12px; text-align: center;
    }

    .empty-icon {
      width: 80px; height: 80px; border-radius: 20px;
      background: var(--walnut3); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; margin-bottom: 8px;
      box-shadow: var(--shadow-sm);
    }

    .empty-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 22px; color: var(--flax);
    }

    /* ── Speaker Detail ── */
    #speakerDetail { display: none; flex-direction: column; gap: 22px; }

    /* ── Now Playing ── */
    .np-card {
      background: var(--walnut3);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 30px;
      box-shadow: var(--shadow-md), var(--shadow-inset);
      position: relative; overflow: hidden;
    }

    /* Warm amber candlelight bloom */
    .np-card::before {
      content: ''; position: absolute;
      top: -100px; right: -80px;
      width: 340px; height: 340px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,132,58,0.14) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Dark vignette corners */
    .np-card::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 0% 100%, rgba(10,7,4,0.25) 0%, transparent 55%);
      pointer-events: none; border-radius: 20px;
    }

    .np-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 24px;
    }

    .np-badge {
      display: inline-flex; align-items: center; gap: 7px;
      background: rgba(212,132,58,0.12);
      border: 1px solid rgba(212,132,58,0.22);
      border-radius: 20px; padding: 5px 12px 5px 8px;
      font-size: 10.5px; font-weight: 500; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--amber2);
    }

    .badge-pulse {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--online);
      animation: amber-pulse 2.2s ease-out infinite;
    }

    .badge-pulse.off { background: var(--grain2); animation: none; }

    @keyframes amber-pulse {
      0%   { box-shadow: 0 0 0 0 rgba(122,184,150,0.5); }
      70%  { box-shadow: 0 0 0 7px rgba(122,184,150,0); }
      100% { box-shadow: 0 0 0 0 rgba(122,184,150,0); }
    }

    /* Waveform visualizer */
    .np-viz { display: flex; align-items: center; gap: 3px; height: 28px; }

    .viz-bar {
      width: 3px; border-radius: 2px;
      background: var(--amber);
      opacity: 0.5;
      transition: height 0.2s ease;
    }

    .np-track {
      font-family: 'Lora', Georgia, serif;
      font-size: 38px; line-height: 1.1;
      color: var(--parchment);
      margin-bottom: 7px;
      font-weight: 600;
    }

    .np-artist { font-size: 13.5px; color: var(--sandstone); margin-bottom: 14px; }

    .np-source-tag {
      display: inline-block;
      background: rgba(212,180,140,0.07);
      border: 1px solid var(--border);
      border-radius: 6px; padding: 4px 10px;
      font-size: 10.5px; font-weight: 500; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--grain3);
    }

    /* Transport */
    .transport {
      display: flex; align-items: center; gap: 10px;
      margin-top: 24px; padding-top: 22px;
      border-top: 1px solid var(--border2);
    }

    .t-spacer { flex: 1; }

    .t-btn {
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer; border-radius: 50%;
      transition: all 0.17s; font-family: inherit;
    }

    .t-btn.sm {
      width: 38px; height: 38px; font-size: 14px;
      background: var(--plank); border: 1px solid var(--border);
      color: var(--sandstone); box-shadow: var(--shadow-sm);
    }

    .t-btn.sm:hover { background: var(--grain); color: var(--parchment); }

    .t-btn.play {
      width: 56px; height: 56px; font-size: 19px;
      background: linear-gradient(145deg, var(--amber2) 0%, var(--amber) 100%);
      color: var(--walnut);
      box-shadow: 0 4px 18px rgba(212,132,58,0.40), var(--shadow-inset);
    }

    .t-btn.play:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 24px rgba(212,132,58,0.55), var(--shadow-inset);
    }

    .t-btn.play:active { transform: scale(0.97); }

    .t-btn.util {
      width: 36px; height: 36px; font-size: 12px;
      background: var(--walnut2); border: 1px solid var(--border2);
      color: var(--grain3); border-radius: 9px; box-shadow: var(--shadow-sm);
    }

    .t-btn.util:hover { background: var(--plank); color: var(--sandstone); }

    /* Cards */
    .card {
      background: var(--walnut3);
      border: 1px solid var(--border);
      border-radius: 16px; padding: 22px;
      box-shadow: var(--shadow-sm), var(--shadow-inset);
    }

    .card-label {
      font-size: 9.5px; font-weight: 500; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--grain3); margin-bottom: 16px;
    }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    /* Sliders */
    .slider-row { display: flex; align-items: center; gap: 14px; }

    .slider-value {
      font-family: 'Lora', Georgia, serif;
      font-size: 30px; color: var(--amber2);
      min-width: 46px; text-align: right; line-height: 1;
    }

    input[type=range] {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 3px; border-radius: 2px; outline: none; cursor: pointer;
      background: linear-gradient(to right, var(--amber) 0%, var(--amber) var(--pct,50%), var(--grain) var(--pct,50%), var(--grain) 100%);
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--parchment);
      border: 2px solid var(--amber);
      box-shadow: 0 2px 8px rgba(10,7,4,0.50);
      cursor: pointer; transition: transform 0.14s;
    }

    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.18); }

    /* Section heading */
    .section-heading {
      font-family: 'Lora', Georgia, serif;
      font-size: 17px; color: var(--flax);
      margin-bottom: 13px; font-weight: 600;
    }

    /* Presets */
    .presets-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; }

    .preset-btn {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; padding: 14px 6px;
      background: var(--walnut3); border: 1px solid var(--border);
      border-radius: 13px; cursor: pointer; font-family: inherit;
      transition: all 0.17s; min-height: 80px;
      box-shadow: var(--shadow-sm), var(--shadow-inset);
    }

    .preset-btn:hover {
      border-color: var(--amber-border);
      background: var(--plank);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md), var(--shadow-inset);
    }

    .preset-btn.active { border-color: var(--amber); background: var(--plank); }
    .preset-btn.empty .preset-num { color: var(--grain); }
    .preset-btn.empty .preset-name { color: var(--grain); }

    .preset-num {
      font-family: 'Lora', Georgia, serif;
      font-size: 26px; color: var(--amber2); line-height: 1;
    }

    .preset-name {
      font-size: 9.5px; font-weight: 500; color: var(--sandstone);
      text-align: center; line-height: 1.3; word-break: break-word;
    }

    /* Sources */
    .sources-wrap { display: flex; flex-wrap: wrap; gap: 8px; }

    .source-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 15px;
      background: var(--plank); border: 1px solid var(--border);
      border-radius: 20px; cursor: pointer; font-family: inherit;
      font-size: 12px; font-weight: 500; color: var(--sandstone);
      transition: all 0.15s; box-shadow: var(--shadow-sm);
    }

    .source-chip:hover { border-color: var(--amber-border); color: var(--flax); background: var(--grain); }

    .source-chip.active {
      background: var(--amber);
      border-color: var(--amber);
      color: var(--walnut);
      box-shadow: 0 2px 10px rgba(212,132,58,0.30);
    }

    /* Zone */
    .zone-empty {
      padding: 18px; background: var(--walnut2);
      border: 1px dashed var(--grain); border-radius: 12px;
      text-align: center; color: var(--grain3); font-size: 13px;
    }

    .zone-member-item {
      display: flex; align-items: center; gap: 12px;
      padding: 11px 14px; background: var(--walnut2);
      border: 1px solid var(--border2); border-radius: 11px;
      margin-bottom: 8px; box-shadow: var(--shadow-sm);
    }

    .zone-avatar {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--plank); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .zone-name { font-weight: 500; font-size: 13px; flex: 1; color: var(--flax); }

    .zone-pill {
      font-size: 9.5px; font-weight: 500; letter-spacing: 0.6px;
      text-transform: uppercase; padding: 3px 9px; border-radius: 10px;
    }

    .zone-pill.master { background: rgba(212,132,58,0.18); color: var(--amber2); border: 1px solid var(--amber-border); }
    .zone-pill.slave  { background: rgba(122,184,150,0.14); color: var(--online);  border: 1px solid rgba(122,184,150,0.25); }

    .zone-add-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 10px; background: none;
      border: 1px dashed var(--grain); border-radius: 11px;
      color: var(--grain3); font-family: inherit; font-size: 12.5px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; margin-top: 8px;
    }

    .zone-add-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }

    .zone-remove {
      background: none; border: none; cursor: pointer;
      color: var(--grain2); font-size: 12px; padding: 4px;
      border-radius: 6px; transition: all 0.15s;
    }

    .zone-remove:hover { color: var(--danger); background: rgba(192,90,58,0.15); }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(10,7,4,0.65); backdrop-filter: blur(10px);
      z-index: 500; align-items: center; justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--walnut2);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 30px; width: 380px;
      box-shadow: var(--shadow-lg), var(--shadow-inset);
      animation: modal-in 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes modal-in {
      from { opacity:0; transform: scale(0.93) translateY(10px); }
      to   { opacity:1; transform: none; }
    }

    .modal-title {
      font-family: 'Lora', Georgia, serif;
      font-size: 21px; color: var(--parchment);
      margin-bottom: 20px; font-weight: 600;
    }

    .field { margin-bottom: 15px; }

    .field label {
      display: block; font-size: 10px; font-weight: 500;
      letter-spacing: 1.2px; text-transform: uppercase;
      color: var(--grain3); margin-bottom: 7px;
    }

    .field input {
      width: 100%; padding: 11px 14px;
      background: var(--walnut3); border: 1px solid var(--border);
      border-radius: 9px; color: var(--flax);
      font-family: inherit; font-size: 14px;
      outline: none; transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus {
      border-color: var(--amber-border);
      box-shadow: 0 0 0 3px rgba(212,132,58,0.12);
    }

    .field input::placeholder { color: var(--grain3); }

    .modal-btns { display: flex; gap: 10px; margin-top: 22px; }

    .btn {
      flex: 1; padding: 11px 16px; border-radius: 9px;
      font-family: inherit; font-size: 13.5px; font-weight: 500;
      cursor: pointer; border: none; transition: all 0.15s;
    }

    .btn-ghost {
      background: var(--walnut3); border: 1px solid var(--border);
      color: var(--sandstone);
    }

    .btn-ghost:hover { background: var(--plank); color: var(--flax); }

    .btn-primary {
      background: linear-gradient(145deg, var(--amber2) 0%, var(--amber) 100%);
      color: var(--walnut); font-weight: 600;
      box-shadow: 0 2px 10px rgba(212,132,58,0.30);
    }

    .btn-primary:hover { box-shadow: 0 4px 16px rgba(212,132,58,0.42); filter: brightness(1.06); }

    /* Zone modal checkboxes */
    .zone-check-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--walnut3);
      border: 1px solid transparent; border-radius: 11px;
      cursor: pointer; margin-bottom: 8px; transition: all 0.15s;
    }

    .zone-check-item:has(input:checked) {
      border-color: rgba(122,184,150,0.30);
      background: rgba(122,184,150,0.08);
    }

    .zone-check-item input { accent-color: var(--online); width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .zone-check-name { font-size: 13.5px; font-weight: 500; color: var(--flax); flex: 1; }
    .zone-check-ip { font-size: 11px; color: var(--grain3); }

    /* Toasts */
    .toast-container {
      position: fixed; bottom: 24px; right: 28px;
      display: flex; flex-direction: column; gap: 8px; z-index: 999;
    }

    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px; background: var(--plank);
      border: 1px solid var(--border);
      color: var(--flax); border-radius: 12px;
      font-size: 13px; font-weight: 500;
      box-shadow: var(--shadow-lg);
      animation: toast-in 0.2s ease;
    }

    .toast-icon {
      width: 20px; height: 20px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; flex-shrink: 0;
    }

    .toast.success .toast-icon { background: rgba(122,184,150,0.25); color: var(--online); }
    .toast.error   .toast-icon { background: rgba(192,90,58,0.25); color: var(--danger); }

    @keyframes toast-in { from { opacity:0; transform:translateX(16px); } to { opacity:1; transform:none; } }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--grain); border-radius: 2px; }

    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: relative; height: auto; }
      .presets-grid { grid-template-columns: repeat(3,1fr); }
      .two-col { grid-template-columns: 1fr; }
      .main { padding: 20px; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="wordmark">
        <div class="wm-icon">🔊</div>
        <span class="wm-text">SoundTouch</span>
      </div>
      <p class="wm-sub">Multi-room audio</p>
    </div>

    <p class="section-label">Speakers</p>
    <div class="speaker-list" id="speakerList"></div>
    <button class="add-btn" onclick="openAddModal()">＋ Add speaker</button>
  </aside>

  <!-- Main -->
  <main class="main">

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎶</div>
      <p class="empty-title">Select a speaker</p>
      <p style="font-size:13px;color:var(--grain3)">Choose a room from the sidebar</p>
    </div>

    <div id="speakerDetail">

      <!-- Now Playing -->
      <div class="np-card">
        <div class="np-top">
          <div class="np-badge">
            <span class="badge-pulse" id="badgePulse"></span>
            <span id="badgeText">Now playing</span>
          </div>
          <div class="np-viz" id="viz">
            <div class="viz-bar" style="height:55%"></div>
            <div class="viz-bar" style="height:80%"></div>
            <div class="viz-bar" style="height:42%"></div>
            <div class="viz-bar" style="height:90%"></div>
            <div class="viz-bar" style="height:58%"></div>
            <div class="viz-bar" style="height:74%"></div>
            <div class="viz-bar" style="height:38%"></div>
            <div class="viz-bar" style="height:86%"></div>
            <div class="viz-bar" style="height:52%"></div>
            <div class="viz-bar" style="height:68%"></div>
          </div>
        </div>

        <div class="np-track" id="npTrack">—</div>
        <div class="np-artist" id="npArtist"></div>
        <span class="np-source-tag" id="npSource">—</span>

        <div class="transport">
          <button class="t-btn sm" onclick="sendKey('PREV_TRACK')" title="Previous">⏮</button>
          <button class="t-btn play" id="playBtn" onclick="togglePlay()">▶</button>
          <button class="t-btn sm" onclick="sendKey('NEXT_TRACK')" title="Next">⏭</button>
          <span class="t-spacer"></span>
          <button class="t-btn util" onclick="sendKey('MUTE')" title="Mute">🔇</button>
          <button class="t-btn util" onclick="sendKey('SHUFFLE_ON')" title="Shuffle">⇄</button>
          <button class="t-btn util" onclick="sendKey('POWER')" title="Power" style="font-size:11px">⏻</button>
        </div>
      </div>

      <!-- Volume + Bass -->
      <div class="two-col">
        <div class="card">
          <p class="card-label">Volume</p>
          <div class="slider-row">
            <input type="range" id="volSlider" min="0" max="100" value="50"
              oninput="onSlider(this,'volVal')" onchange="setVolume(this.value)" />
            <span class="slider-value" id="volVal">—</span>
          </div>
        </div>
        <div class="card">
          <p class="card-label">Bass</p>
          <div class="slider-row">
            <input type="range" id="bassSlider" min="-9" max="9" value="0"
              oninput="onSlider(this,'bassVal')" onchange="setBass(this.value)" />
            <span class="slider-value" id="bassVal">—</span>
          </div>
        </div>
      </div>

      <!-- Presets -->
      <div>
        <p class="section-heading">Presets</p>
        <div class="presets-grid" id="presetsGrid"></div>
      </div>

      <!-- Sources -->
      <div class="card">
        <p class="card-label">Sources</p>
        <div class="sources-wrap" id="sourcesGrid"></div>
      </div>

      <!-- Zone -->
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <p class="card-label" style="margin-bottom:0">Multi-room zone</p>
          <span id="zoneStatus" style="font-size:11px;color:var(--grain3)">No active zone</span>
        </div>
        <div id="zoneMembers"></div>
        <button class="zone-add-btn" onclick="openZoneModal()">＋ Manage zone</button>
      </div>

    </div>
  </main>
</div>

<!-- Add Speaker Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <p class="modal-title">Add a speaker</p>
    <div class="field"><label>Display name</label><input type="text" id="newName" placeholder="e.g. Master Bedroom" /></div>
    <div class="field"><label>IP address</label><input type="text" id="newIP" placeholder="192.168.10.x" /></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-primary" onclick="addSpeaker()">Add speaker</button>
    </div>
  </div>
</div>

<!-- Zone Modal -->
<div class="modal-overlay" id="zoneModal">
  <div class="modal" style="width:420px">
    <p class="modal-title">Manage zone</p>
    <p style="font-size:13px;color:var(--grain3);margin-bottom:18px;line-height:1.6">Select speakers to group with this one. This speaker becomes the zone master.</p>
    <div id="zoneCheckList"></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeZoneModal()">Cancel</button>
      <button class="btn btn-primary" onclick="applyZone()">Apply zone</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
let speakers=[], activeSpeakerId=null, playState='STOP_STATE', vizTimer=null;

const roomEmoji={living:'🛋️',kitchen:'🍳',bed:'🛏️',bath:'🚿',office:'💻',study:'📚',gym:'💪',garage:'🚗',sewing:'🧵',patio:'🌿',deck:'🌿',dining:'🍽️',music:'🎵',media:'📺'};
function getEmoji(n){const l=n.toLowerCase();for(const[k,v] of Object.entries(roomEmoji))if(l.includes(k))return v;return'🔊';}

function onSlider(el, valId){
  document.getElementById(valId).textContent = el.value;
  const pct = ((el.value - el.min)/(el.max - el.min)*100).toFixed(1)+'%';
  el.style.setProperty('--pct', pct);
}

async function init(){
  const r=await fetch('/api/speakers'); speakers=await r.json(); renderSidebar(); connectSSE();
}

function connectSSE(){
  const es=new EventSource('/api/events');
  es.addEventListener('speakerUpdate',e=>{const{speakerId,data}=JSON.parse(e.data);if(speakerId===activeSpeakerId)handleUpdate(data);markOnline(speakerId);});
  es.addEventListener('speakerOnline', e=>markOnline(JSON.parse(e.data).speakerId));
  es.addEventListener('speakerOffline',e=>markOffline(JSON.parse(e.data).speakerId));
  es.onerror=()=>setTimeout(connectSSE,4000);
}

function markOnline(id){const d=document.querySelector(`[data-sid="${id}"] .status-dot`);if(d){d.classList.add('online');const s=d.nextSibling;if(s)s.textContent='Online';}}
function markOffline(id){const d=document.querySelector(`[data-sid="${id}"] .status-dot`);if(d){d.classList.remove('online');const s=d.nextSibling;if(s)s.textContent='Offline';}}
function handleUpdate(data){if(data.nowPlaying)renderNP(data.nowPlaying);if(data.volume)syncVol(data.volume.volume);}

function renderSidebar(){
  document.getElementById('speakerList').innerHTML=speakers.map(s=>`
    <div class="speaker-item${s.id===activeSpeakerId?' active':''}" data-sid="${s.id}" onclick="selectSpeaker('${s.id}')">
      <div class="speaker-avatar">${getEmoji(s.name)}</div>
      <div class="speaker-info">
        <div class="speaker-name">${s.name}</div>
        <div class="speaker-status"><span class="status-dot"></span><span>Connecting…</span></div>
      </div>
      <button class="speaker-delete" onclick="deleteSpeaker(event,'${s.id}')">✕</button>
    </div>`).join('');
}

async function selectSpeaker(id){
  activeSpeakerId=id; renderSidebar();
  document.getElementById('emptyState').style.display='none';
  const sd=document.getElementById('speakerDetail');
  sd.style.display='flex'; sd.style.flexDirection='column'; sd.style.gap='22px';
  await Promise.all([fetchNP(),fetchVol(),fetchBass(),fetchPresets(),fetchSources(),fetchZone()]);
}

async function fetchNP(){try{const r=await fetch(`/api/${activeSpeakerId}/now_playing`);renderNP((await r.json()).nowPlaying);}catch(e){}}

function renderNP(np){
  if(!np)return;
  playState=np.$.playStatus||'STOP_STATE';
  document.getElementById('npTrack').textContent=np.track||np.stationName||np.ContentItem?.$.itemName||'—';
  document.getElementById('npArtist').textContent=np.artist||np.description||'';
  document.getElementById('npSource').textContent=np.$.source||'—';
  const playing=playState==='PLAY_STATE';
  document.getElementById('playBtn').textContent=playing?'⏸':'▶';
  document.getElementById('badgePulse').className='badge-pulse'+(playing?'':' off');
  document.getElementById('badgeText').textContent=playing?'Now playing':'Stopped';
  playing?startViz():stopViz();
}

function startViz(){
  if(vizTimer)return;
  const bars=document.querySelectorAll('.viz-bar');
  vizTimer=setInterval(()=>{bars.forEach(b=>{b.style.height=(10+Math.random()*90)+'%';b.style.opacity=(0.3+Math.random()*0.7).toFixed(2);});},200);
}
function stopViz(){
  clearInterval(vizTimer);vizTimer=null;
  document.querySelectorAll('.viz-bar').forEach(b=>{b.style.height='12%';b.style.opacity='0.2';});
}

async function sendKey(key){
  try{await fetch(`/api/${activeSpeakerId}/key`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key})});setTimeout(fetchNP,600);}
  catch(e){toast('Could not send command','error');}
}
function togglePlay(){sendKey(playState==='PLAY_STATE'?'PAUSE':'PLAY');}

async function fetchVol(){try{const r=await fetch(`/api/${activeSpeakerId}/volume`);syncVol((await r.json()).volume);}catch(e){}}
function syncVol(vol){if(!vol)return;const v=parseInt(vol.actualvolume??vol.targetvolume??50);const el=document.getElementById('volSlider');el.value=v;onSlider(el,'volVal');}
async function setVolume(v){await fetch(`/api/${activeSpeakerId}/volume`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({volume:parseInt(v)})});}

async function fetchBass(){try{const r=await fetch(`/api/${activeSpeakerId}/bass`);const d=await r.json();const v=parseInt(d.bass?.actualbass??d.bass?.targetbass??0);const el=document.getElementById('bassSlider');el.value=v;onSlider(el,'bassVal');}catch(e){}}
async function setBass(v){await fetch(`/api/${activeSpeakerId}/bass`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bass:parseInt(v)})});}

async function fetchPresets(){
  const g=document.getElementById('presetsGrid');
  try{
    const r=await fetch(`/api/${activeSpeakerId}/presets`);const d=await r.json();
    let list=d.presets?.preset||[];if(!Array.isArray(list))list=[list];
    const map={};list.forEach(p=>{if(p?.$?.id)map[p.$.id]=p;});
    g.innerHTML='';
    for(let i=1;i<=6;i++){
      const p=map[i];const name=p?.ContentItem?.$.itemName||p?.ContentItem?._||'';
      const btn=document.createElement('button');
      btn.className=`preset-btn${p?'':' empty'}`;
      btn.innerHTML=`<span class="preset-num">${i}</span><span class="preset-name">${name||'—'}</span>`;
      if(p)btn.onclick=()=>playPreset(p.ContentItem);
      g.appendChild(btn);
    }
  }catch(e){g.innerHTML=Array.from({length:6},(_,i)=>`<button class="preset-btn empty"><span class="preset-num">${i+1}</span><span class="preset-name">—</span></button>`).join('');}
}

async function playPreset(ci){
  await fetch(`/api/${activeSpeakerId}/select`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ContentItem:ci})});
  setTimeout(fetchNP,800);
}

async function fetchSources(){
  const g=document.getElementById('sourcesGrid');
  try{
    const r=await fetch(`/api/${activeSpeakerId}/sources`);const d=await r.json();
    let items=d.sources?.sourceItem||[];if(!Array.isArray(items))items=[items];
    g.innerHTML='';
    items.forEach(item=>{
      if(!item||item.$.status!=='READY')return;
      const chip=document.createElement('button');chip.className='source-chip';
      chip.textContent=item._||item.$.source;
      chip.onclick=()=>{document.querySelectorAll('.source-chip').forEach(c=>c.classList.remove('active'));chip.classList.add('active');selectSource(item);};
      g.appendChild(chip);
    });
    if(!g.innerHTML)g.innerHTML='<span style="font-size:13px;color:var(--grain3)">No sources available</span>';
  }catch(e){g.innerHTML='<span style="font-size:13px;color:var(--grain3)">Could not load sources</span>';}
}

async function selectSource(item){
  await fetch(`/api/${activeSpeakerId}/select`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ContentItem:item})});
  setTimeout(fetchNP,800);
}

async function fetchZone(){
  const el=document.getElementById('zoneMembers'),st=document.getElementById('zoneStatus');
  try{
    const r=await fetch(`/api/${activeSpeakerId}/zone`);const d=await r.json();const zone=d.zone;
    if(!zone?.member){st.textContent='No active zone';el.innerHTML='<div class="zone-empty">This speaker is not grouped with others.</div>';return;}
    let members=zone.member;if(!Array.isArray(members))members=[members];
    st.textContent=`${members.length} speaker${members.length!==1?'s':''} grouped`;
    el.innerHTML=members.map(m=>{const spk=speakers.find(s=>s.ip===m.$.ipaddress)||{name:m.$.ipaddress};const isMaster=m._===zone.$.master;
      return`<div class="zone-member-item"><div class="zone-avatar">${getEmoji(spk.name)}</div><span class="zone-name">${spk.name}</span><span class="zone-pill ${isMaster?'master':'slave'}">${isMaster?'Master':'Slave'}</span>${!isMaster?'<button class="zone-remove">✕</button>':''}</div>`;
    }).join('');
  }catch(e){el.innerHTML='<div class="zone-empty">Could not load zone info.</div>';}
}

function openZoneModal(){
  document.getElementById('zoneCheckList').innerHTML=speakers.filter(s=>s.id!==activeSpeakerId).map(s=>`
    <label class="zone-check-item">
      <input type="checkbox" data-id="${s.id}" data-ip="${s.ip}" />
      <span style="font-size:18px">${getEmoji(s.name)}</span>
      <span class="zone-check-name">${s.name}</span>
      <span class="zone-check-ip">${s.ip}</span>
    </label>`).join('')||'<p style="color:var(--grain3);font-size:13px">No other speakers available.</p>';
  document.getElementById('zoneModal').classList.add('open');
}
function closeZoneModal(){document.getElementById('zoneModal').classList.remove('open');}

async function applyZone(){
  const checked=[...document.querySelectorAll('#zoneCheckList input:checked')];
  if(!checked.length){toast('Select at least one speaker','error');return;}
  const infoD=await(await fetch(`/api/${activeSpeakerId}/info`)).json();
  const masterDeviceId=infoD.info?.$.deviceID||'';
  const slaves=await Promise.all(checked.map(async cb=>{const spk=speakers.find(s=>s.id===cb.dataset.id);const d=await(await fetch(`/api/${spk.id}/info`)).json();return{ip:spk.ip,deviceId:d.info?.$.deviceID||''};}));
  await fetch(`/api/${activeSpeakerId}/setZone`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({masterDeviceId,slaves})});
  closeZoneModal();toast('Zone created','success');setTimeout(fetchZone,1000);
}

function openAddModal(){document.getElementById('addModal').classList.add('open');}
function closeAddModal(){document.getElementById('addModal').classList.remove('open');}

async function addSpeaker(){
  const name=document.getElementById('newName').value.trim(),ip=document.getElementById('newIP').value.trim();
  if(!name||!ip){toast('Name and IP are required','error');return;}
  const spk=await(await fetch('/api/speakers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,ip})})).json();
  speakers.push(spk);renderSidebar();closeAddModal();
  document.getElementById('newName').value='';document.getElementById('newIP').value='';
  toast(`${name} added`,'success');
}

async function deleteSpeaker(e,id){
  e.stopPropagation();const spk=speakers.find(s=>s.id===id);
  if(!confirm(`Remove "${spk?.name}"?`))return;
  await fetch(`/api/speakers/${id}`,{method:'DELETE'});
  speakers=speakers.filter(s=>s.id!==id);
  if(activeSpeakerId===id){activeSpeakerId=null;document.getElementById('emptyState').style.display='';document.getElementById('speakerDetail').style.display='none';stopViz();}
  renderSidebar();toast(`${spk?.name} removed`,'success');
}

function toast(msg,type='success'){
  const t=document.createElement('div');t.className=`toast ${type}`;
  t.innerHTML=`<span class="toast-icon">${type==='success'?'✓':'!'}</span>${msg}`;
  document.getElementById('toasts').appendChild(t);setTimeout(()=>t.remove(),3200);
}

document.getElementById('addModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAddModal();});
document.getElementById('zoneModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeZoneModal();});
document.addEventListener('keydown',e=>{
  if(!activeSpeakerId||e.target.tagName==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();togglePlay();}
  if(e.code==='ArrowRight')sendKey('NEXT_TRACK');
  if(e.code==='ArrowLeft')sendKey('PREV_TRACK');
  if(e.code==='KeyM')sendKey('MUTE');
  if(e.key==='Escape'){closeAddModal();closeZoneModal();}
});

init();
</script>
</body>
</html>
